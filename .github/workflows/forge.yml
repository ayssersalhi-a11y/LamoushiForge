name: Lamoushi Forge Engine
on:
  repository_dispatch:
    types: [build_library]

jobs:
  build_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Last Version
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Execution & Logging
        id: exec_step
        run: |
          # 1. إنشاء مجلد السجلات إذا لم يكن موجوداً
          mkdir -p build_history
          
          # 2. تسجيل المرحلة الحالية بناءً على التفسير القادم من الهاتف
          TIMESTAMP=$(date +'%Y-%m-%d %H:%M')
          echo "[$TIMESTAMP] المرحلة: ${{ github.event.client_payload.summary }}" >> build_history/steps_log.txt
          
          # 3. تنفيذ الأوامر المرسلة من هاتفك
          ${{ github.event.client_payload.instructions }}

      - name: Calculate Size & Package
        id: info
        run: |
          # تحديد المجلد المستهدف
          TARGET_DIR="./ffmpeg_source/android_build"
          
          # التحقق من وجود المجلد لتجنب خطأ الفشل السابق (Exit Code 12)
          if [ -d "$TARGET_DIR" ]; then
            SIZE=$(du -sh "$TARGET_DIR" | cut -f1)
            echo "final_size=$SIZE" >> $GITHUB_OUTPUT
            zip -r LamoushiForge_${{ github.run_number }}.zip "$TARGET_DIR"
          else
            # إذا لم يوجد مجلد، ننشئ ملفاً يوضح ذلك لكي لا تفشل العملية
            echo "final_size=NoOutput" >> $GITHUB_OUTPUT
            echo "المجلد المستهدف غير موجود في هذا المسار" > missing_folder.txt
            zip -r LamoushiForge_${{ github.run_number }}.zip missing_folder.txt
          fi

      - name: Auto-Save Progress (Commit)
        if: always() # يحفظ السجل حتى لو فشلت الخطوات السابقة
        run: |
          git config --global user.name "Lamoushi-Forge-Bot"
          git config --global user.email "bot@lamoushi.forge"
          
          # إضافة السجلات الجديدة لضمان ظهورها في التطبيق
          git add build_history/steps_log.txt
          git commit -m "Build ${{ github.run_number }}: تحديث السجل" || echo "لا توجد تغييرات"
          git push

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          # نضع الحجم في اسم الملف ليظهر في Godot تلقائياً
          name: Build_${{ github.run_number }}_Size_${{ steps.info.outputs.final_size }}
          path: LamoushiForge_${{ github.run_number }}.zip
