name: Lamoushi Forge Engine
on:
  repository_dispatch:
    types: [build_library]

jobs:
  build_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Last Version
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # استخدام الأداة الرسمية لتجهيز بيئة الأندرويد
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # تحميل الـ NDK تحديداً لإتاحة المترجم (Clang) للكود الخاص بك
      - name: Install NDK
        run: |
          sdkmanager --install "ndk;25.2.9519653"
          # تعريف المسار لكي يتعرف عليه سكريبت البناء الخاص بك
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Cache FFmpeg Source
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: ffmpeg_core
          key: ffmpeg-source-v1

      - name: Preparation & Environment
        run: |
          mkdir -p build_history
          mkdir -p android_lib_output
          TIMESTAMP=$(date +'%H:%M')
          echo "[$TIMESTAMP] 🚀 نظام لموشي: تم تجهيز بيئة Android NDK الرسمية" > build_history/steps_log.txt

      - name: Execution & Logging
        run: |
          echo "[$(date +'%H:%M')] 🛠️ بدء البناء الموجه للأندرويد (ARM64)..." >> build_history/steps_log.txt
          # تنفيذ التعليمات المرسلة من غودوت (التي تستخدم TOOLCHAIN)
          ${{ github.event.client_payload.instructions }}
          echo "[$(date +'%H:%M')] ✅ انتهت عملية الصهر بنجاح" >> build_history/steps_log.txt

      - name: Post-Build Analysis
        id: info
        if: always()
        run: |
          TARGET_DIR="./android_lib_output"
          ZIP_NAME="LamoushiForge_Android_${{ github.run_number }}.zip"
          if [ -d "$TARGET_DIR" ] && [ "$(ls -A $TARGET_DIR)" ]; then
            SIZE=$(du -sh "$TARGET_DIR" | cut -f1)
            echo "final_size=$SIZE" >> $GITHUB_OUTPUT
            zip -r "$ZIP_NAME" "$TARGET_DIR"
          else
            echo "final_size=Error" >> $GITHUB_OUTPUT
            echo "⚠️ خطأ: لم يتم العثور على مكتبات في مجلد المخرجات" > error_report.txt
            zip -r "$ZIP_NAME" error_report.txt
          fi

      - name: Auto-Save Progress
        if: always()
        run: |
          git config --global user.name "Lamoushi-Forge-Bot"
          git config --global user.email "bot@lamoushi.forge"
          git add build_history/steps_log.txt
          git commit -m "Build Android ${{ github.run_number }} [Automated]" || echo "No changes"
          git push

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Lamoushi_Android_Build_${{ github.run_number }}
          path: LamoushiForge_Android_${{ github.run_number }}.zip
