name: Lamoushi Forge Engine
on:
  repository_dispatch:
    types: [build_library]

jobs:
  build_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Last Version
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- ميزة التخزين الذكي (Cache) لعدم تكرار التحميل ---
      - name: Cache FFmpeg Source
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: ffmpeg_core
          key: ffmpeg-source-v1 # إذا أردت مسح الكاش وتنزيل نسخة جديدة، غير v1 إلى v2

      - name: Preparation & Environment
        run: |
          mkdir -p build_history
          mkdir -p android_lib_output
          
          TIMESTAMP=$(date +'%H:%M')
          echo "[$TIMESTAMP] 🚀 نظام لموشي: تم استلام طلب ${{ github.event.client_payload.library }}" > build_history/steps_log.txt
          echo "[$TIMESTAMP] 📋 الملخص: ${{ github.event.client_payload.summary }}" >> build_history/steps_log.txt

      - name: Execution & Logging
        run: |
          echo "[$(date +'%H:%M')] 🛠️ بدء تنفيذ التعليمات البرمجية..." >> build_history/steps_log.txt
          
          # تنفيذ التعليمات المرسلة من Godot
          ${{ github.event.client_payload.instructions }}
          
          echo "[$(date +'%H:%M')] ✅ انتهت المرحلة بنجاح" >> build_history/steps_log.txt

      - name: Post-Build Analysis
        id: info
        if: always()
        run: |
          # نستخدم المجلد الجديد الذي حددناه في سكريبت غودوت
          TARGET_DIR="./android_lib_output"
          ZIP_NAME="LamoushiForge_${{ github.run_number }}.zip"
          
          if [ -d "$TARGET_DIR" ] && [ "$(ls -A $TARGET_DIR)" ]; then
            SIZE=$(du -sh "$TARGET_DIR" | cut -f1)
            echo "final_size=$SIZE" >> $GITHUB_OUTPUT
            zip -r "$ZIP_NAME" "$TARGET_DIR"
            echo "[$(date +'%H:%M')] 📦 تم ضغط المكتبات بنجاح ($SIZE)" >> build_history/steps_log.txt
          else
            echo "final_size=Error" >> $GITHUB_OUTPUT
            echo "⚠️ خطأ: المكتبات لم تُنتج بعد." > error_report.txt
            zip -r "$ZIP_NAME" error_report.txt
          fi

      - name: Auto-Save Progress (Commit Logs)
        if: always()
        run: |
          git config --global user.name "Lamoushi-Forge-Bot"
          git config --global user.email "bot@lamoushi.forge"
          git add build_history/steps_log.txt
          git commit -m "Build ${{ github.run_number }}: Update Logs" || echo "No changes"
          git push

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build_${{ github.run_number }}_Size_${{ steps.info.outputs.final_size }}
          path: LamoushiForge_${{ github.run_number }}.zip
          retention-days: 1
